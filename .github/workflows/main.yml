name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test src/test

      - name: Build Test
        run: npm run build

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Test
        run: npm run build

  deploy:
    # Wait for tests to pass
    needs: [test-backend, test-frontend]

    # Only deploy if its a push/merge to main
    if: github.ref == 'refs/heads/main'

    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./

    environment:
      name: production-docker-windows
      url: https://colorclashes.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Dynamically generate the .env file using GitHub Secrets
      - name: Inject Environment Variables
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "CLOUDFLARE_TOKEN=${{ secrets.CLOUDFLARE_TOKEN }}" >> .env

      # 2. TARGETED Build: Explicitly tell Docker WHICH containers to build
      - name: Nuke Cache and Rebuild Apps
        run: docker compose build --no-cache frontend backend

      # 3. TARGETED Deploy: Leave the runner and cloudflare alone!
      - name: Deploy Live
        run: docker compose up -d frontend backend
